<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup: [name] · CHG-XXXX</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; background: #fafafa; padding: 2rem; }

    /* Layout */
    .page { max-width: 960px; margin: 0 auto; }
    .header { padding: 1rem 0; border-bottom: 1px solid #e5e5e5; margin-bottom: 2rem; }
    .content { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Components */
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 1.5rem; }
    .btn { display: inline-flex; align-items: center; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 0.875rem; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .input { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; font-size: 0.875rem; }

    /* States */
    .state-loading { opacity: 0.5; }
    .state-error { border-color: #ef4444; }
    .state-empty { text-align: center; color: #9ca3af; padding: 3rem; }

    /* Typography */
    h1 { font-size: 1.5rem; font-weight: 600; }
    h2 { font-size: 1.25rem; font-weight: 600; }
    p { line-height: 1.6; color: #4b5563; }

    /* Mockup annotation */
    .annotation { background: #fef3c7; border: 1px dashed #f59e0b; padding: 0.5rem; border-radius: 4px; font-size: 0.75rem; color: #92400e; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>[Page title]</h1>
      <div class="annotation">Mockup: [flow/state name] · CHG-XXXX · State: success</div>
    </div>
    <div class="content">
      <!-- Replace with actual mockup content -->
      <div class="card">
        <h2>[Section]</h2>
        <p>[Content description]</p>
      </div>
    </div>
  </div>
</body>
</html>
